name: Run SEC Filing Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: sec-filing-monitor
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run filing monitor
        run: python run_monitor.py

      - name: Process detected filings
        run: python run_processor.py

      - name: Backfill missing Storage paths
        run: python run_backfill.py

      - name: List detected filings
        run: python list_filings.py
