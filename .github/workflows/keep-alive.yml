name: Keep API Awake

# Pings the public /health endpoint so the Render free-tier dyno never
# sleeps long enough for a visitor to hit a cold start. Read-only: no
# secrets, no database access, no writes.
#
# Note: GitHub schedules are best-effort and may lag a few minutes under
# load; Render free tier sleeps after ~15 minutes idle, so a 10-minute
# cadence keeps the dyno warm in practice.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: keep-api-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping /health
        run: |
          curl --fail --silent --show-error --max-time 90 \
            https://earnings-intelligence-os-api.onrender.com/health
